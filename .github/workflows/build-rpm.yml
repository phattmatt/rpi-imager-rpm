name: Build RPM

on:
  push:
    branches:
      - main
    tags:
      - rpm-v*
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Upstream version to build, for example 2.0.8. Leave blank to use the spec.
        required: false
        type: string

permissions:
  contents: write

jobs:
  rpm:
    name: Fedora RPM
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Check out packaging repo
        uses: actions/checkout@v4

      - name: Install RPM build tooling
        run: |
          dnf -y install dnf-plugins-core git python3 rpm-build rpmdevtools
          dnf -y builddep ./rpi-imager.spec

      - name: Apply manual version input
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          python3 scripts/update-version.py --version "${{ inputs.version }}" --packager "GitHub Actions <actions@github.com>"

      - name: Prepare rpmbuild tree
        run: |
          mkdir -p .rpmbuild/BUILD .rpmbuild/BUILDROOT .rpmbuild/RPMS .rpmbuild/SOURCES .rpmbuild/SPECS .rpmbuild/SRPMS
          cp -a patches/*.patch .rpmbuild/SOURCES/

      - name: Fetch upstream source archive
        run: |
          spectool -g -C "$PWD/.rpmbuild/SOURCES" ./rpi-imager.spec

      - name: Build source and binary RPMs
        run: |
          rpmbuild -ba ./rpi-imager.spec --define "_topdir $PWD/.rpmbuild"

      - name: Smoke test RPM install
        run: |
          rpm_path="$(find "$PWD/.rpmbuild/RPMS" -type f -name 'rpi-imager-*.rpm' ! -name '*.src.rpm' | sort | head -n 1)"
          test -n "$rpm_path"
          dnf -y install "$rpm_path"
          rpm -q rpi-imager
          rpm -ql rpi-imager
          rpm -V rpi-imager
          test -x /usr/bin/rpi-imager
          test -f /usr/share/applications/com.raspberrypi.rpi-imager.desktop
          test -f /usr/share/metainfo/com.raspberrypi.rpi-imager.metainfo.xml
          test -f /usr/share/polkit-1/actions/com.raspberrypi.rpi-imager.policy
          ldd /usr/bin/rpi-imager | tee /tmp/rpi-imager-ldd.txt
          ! grep -q "not found" /tmp/rpi-imager-ldd.txt

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpi-imager-rpms
          path: |
            .rpmbuild/RPMS/**/*.rpm
            .rpmbuild/SRPMS/*.rpm

      - name: Detect upstream release metadata
        id: release_meta
        if: startsWith(github.ref, 'refs/tags/rpm-v')
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          upstream_version="$(sed -n 's/^%global upstream_version[[:space:]]\+\(.*\)$/\1/p' rpi-imager.spec)"
          test -n "$upstream_version"
          export UPSTREAM_VERSION="$upstream_version"
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          upstream_version = os.environ["UPSTREAM_VERSION"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          url = f"https://api.github.com/repos/raspberrypi/rpi-imager/releases/tags/v{upstream_version}"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "rpi-imager-rpm-release-meta",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              data = json.load(response)

          prerelease = bool(data.get("prerelease"))
          release_name = f"{ref_name} (prerelease)" if prerelease else ref_name
          lines = [
              f"Automated RPM build for upstream tag `v{upstream_version}`.",
              "",
          ]
          if prerelease:
              lines.extend(
                  [
                      "> Note: this RPM tracks an upstream Raspberry Pi Imager prerelease.",
                      "",
                  ]
              )
          lines.extend(
              [
                  f"RPM package version: `{ref_name.removeprefix('rpm-v')}`",
                  "",
                  "Published asset: installable binary RPM only.",
              ]
          )
          release_body = "\n".join(lines)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"prerelease={'true' if prerelease else 'false'}\n")
              handle.write(f"release_name={release_name}\n")
              handle.write("release_body<<EOF\n")
              handle.write(release_body)
              handle.write("\nEOF\n")
          PY

      - name: Publish tag release
        if: startsWith(github.ref, 'refs/tags/rpm-v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          body: ${{ steps.release_meta.outputs.release_body }}
          files: |
            .rpmbuild/RPMS/*/rpi-imager-[0-9]*.rpm
